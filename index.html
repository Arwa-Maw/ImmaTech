<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Builder AR — ImmaTech</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="margin: 0; overflow: hidden;">

    <h1>PC Builder AR</h1>
    <p>Scene AR initialisee — en attente du marqueur Hiro.</p>

    <!-- Scene A-Frame AR -->
    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false"
        loading-screen="enabled: false"
        renderer="logarithmicDepthBuffer: true; colorManagement: true;"
    >
        <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.7"
                 position="1 3 2" castShadow="false"></a-light>
        <a-light type="directional" color="#aaddff" intensity="0.3"
                 position="-2 2 -1"></a-light>

        <a-marker preset="hiro" id="main-marker" emitevents="true">
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script src="js/app.js"></script>
</body>
</html>
