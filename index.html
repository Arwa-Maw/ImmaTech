<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Builder AR — ImmaTech</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Overlays decoratifs -->
    <div class="scanlines"></div>
    <div class="cyber-grid"></div>

    <!-- ======================== -->
    <!-- ECRAN D'ACCUEIL          -->
    <!-- ======================== -->
    <div id="welcome-screen" class="overlay">
        <div class="welcome-container">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 2v4H5v4H2v4h3v4h4v4h6v-4h4v-4h3v-4h-3V6h-4V2H9zm0 2h6v4h4v4h-4v4H9v-4H5V8h4V4z"/>
                </svg>
            </div>
            <h1 class="glitch-text">PC <span class="highlight-cyan">BUILDER</span> AR</h1>
            <p class="subtitle">IMMATECH // FORMATION</p>
            <div class="separator"></div>
            <p class="description">
                Assemblez un PC etape par etape en realite augmentee.
                Identifiez chaque composant, repondez aux diagnostics,
                et construisez votre machine.
            </p>
            <div class="team-info">
                <span>MOUNIR</span> // <span>MATTEO</span> // <span>MARWAN</span>
            </div>
            <button id="btn-start" class="btn-primary" onclick="startExperience()">
                INITIALISER
            </button>
            <p class="hint">Imprimez ou affichez le marqueur HIRO sur un ecran</p>
        </div>
    </div>

    <!-- Scene A-Frame AR -->
    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false"
        loading-screen="enabled: false"
        renderer="logarithmicDepthBuffer: true; colorManagement: true;"
    >
        <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.7"
                 position="1 3 2" castShadow="false"></a-light>
        <a-light type="directional" color="#aaddff" intensity="0.3"
                 position="-2 2 -1"></a-light>
        <a-marker preset="hiro" id="main-marker" emitevents="true"></a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script src="js/app.js"></script>
</body>
</html>
